<?xml version="1.0" encoding="UTF-8"?>
<!--
  图编号：图 4
  图题：  仿真平台架构图
  论文章节：3.3 仿真平台模块设计
  关键依赖：与 five_link_ctrl_simulation/{Simulation.py, environment.py, MJCF/*.xml} 保持一致
            纵向 4 层：主循环层 / 接口层 / 物理仿真层 / 模型层
            多档周期：物理 1ms · 传感 1ms · 控制 4ms · 监控 20ms
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 920 600" width="920" height="600"
     font-family="'Noto Serif CJK SC','Source Han Serif SC','Songti SC','SimSun','Times New Roman',serif">
  <style>
    .bg     { fill:#ffffff; }
    .layer  { fill:#fafafa; stroke:#000; stroke-width:1.4; }
    .layer2 { fill:#f0f0f0; stroke:#000; stroke-width:1.4; }
    .sub    { fill:#ffffff; stroke:#000; stroke-width:1.0; }
    .arrow  { fill:none; stroke:#000; stroke-width:1.6; }
    .tick   { fill:#ffffff; stroke:#000; stroke-width:1.0; }
    .ttl    { font-size:18px; font-weight:bold; fill:#000; }
    .lbl    { font-size:14px; fill:#000; }
    .sm     { font-size:12px; fill:#000; }
    .tiny   { font-size:11px; fill:#444; }
    .mono   { font-family:'DejaVu Sans Mono','Consolas','Menlo',monospace; font-size:12px; fill:#000; }
    .mid    { text-anchor:middle; }
    .right  { text-anchor:end; }
    .dashed { fill:none; stroke:#444; stroke-width:1.0; stroke-dasharray:5 4; }
    .panel  { fill:none; stroke:#888; stroke-width:0.8; stroke-dasharray:3 3; }
  </style>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="920" height="600"/>

  <!-- 标题 -->
  <text class="ttl mid" x="460" y="32">仿真平台四层架构</text>
  <text class="tiny mid" x="460" y="50">基于 MuJoCo 物理引擎与原版 MJCF 模型，向上层控制器暴露统一接口</text>

  <!-- 左侧主轴：四层（垂直从上到下） -->
  <!-- 层 1：主循环层 -->
  <g transform="translate(60,70)">
    <rect class="layer" x="0" y="0" width="600" height="92" rx="6"/>
    <text class="lbl" x="14" y="22" font-weight="bold">① 主循环层（Simulation.py）</text>
    <text class="tiny" x="14" y="38">多档周期调度器：按整数倍关系协同物理 / 传感 / 控制 / 监控四类子任务</text>

    <!-- 四档周期 tick -->
    <g transform="translate(14,52)">
      <rect class="tick" x="0"   y="0" width="135" height="32" rx="4"/>
      <text class="sm mid" x="67"  y="14">物理 mj_step</text>
      <text class="mono mid" x="67" y="28">Δt = 1 ms</text>

      <rect class="tick" x="145" y="0" width="135" height="32" rx="4"/>
      <text class="sm mid" x="212" y="14">传感读取</text>
      <text class="mono mid" x="212" y="28">T_s = 1 ms</text>

      <rect class="tick" x="290" y="0" width="135" height="32" rx="4"/>
      <text class="sm mid" x="357" y="14">控制计算</text>
      <text class="mono mid" x="357" y="28">T_c = 4 ms</text>

      <rect class="tick" x="435" y="0" width="135" height="32" rx="4"/>
      <text class="sm mid" x="502" y="14">监控 / 键盘</text>
      <text class="mono mid" x="502" y="28">T_m = 20 ms</text>
    </g>
  </g>

  <!-- 层 2：接口层 -->
  <g transform="translate(60,190)">
    <rect class="layer" x="0" y="0" width="600" height="92" rx="6"/>
    <text class="lbl" x="14" y="22" font-weight="bold">② 接口层（environment.py · LegWheelRobot）</text>
    <text class="tiny" x="14" y="38">把 MuJoCo 原始数据封装为 Python 端的状态读取 / 控制写入函数，对外形式与建模模块一致</text>

    <g transform="translate(14,50)">
      <rect class="sub" x="0"   y="0" width="285" height="36" rx="4"/>
      <text class="sm" x="10" y="15" font-weight="bold">sensor_read_data()</text>
      <text class="tiny" x="10" y="28">IMU 欧拉角/角速度 · 4 关节编码器 · 2 轮编码器</text>

      <rect class="sub" x="295" y="0" width="285" height="36" rx="4"/>
      <text class="sm" x="305" y="15" font-weight="bold">set_actuator_torque()</text>
      <text class="tiny" x="305" y="28">4 关节力矩 · 2 轮力矩（左轮 gainprm 反向）</text>
    </g>
  </g>

  <!-- 层 3：物理仿真层 -->
  <g transform="translate(60,310)">
    <rect class="layer2" x="0" y="0" width="600" height="92" rx="6"/>
    <text class="lbl" x="14" y="22" font-weight="bold">③ 物理仿真层（MuJoCo 内核）</text>
    <text class="tiny" x="14" y="38">数值积分求解器，封闭运行，对外仅以 sensordata / qpos / ctrl 等数据视图交互</text>

    <g transform="translate(14,50)">
      <rect class="sub" x="0"   y="0" width="180" height="36" rx="4"/>
      <text class="mono mid" x="90" y="22">mj_step(model, data)</text>

      <rect class="sub" x="200" y="0" width="180" height="36" rx="4"/>
      <text class="sm mid" x="290" y="15">接触 / 关节约束求解</text>
      <text class="tiny mid" x="290" y="29">含 STL mesh 几何碰撞</text>

      <rect class="sub" x="390" y="0" width="190" height="36" rx="4"/>
      <text class="sm mid" x="485" y="15">执行器 ctrlrange 物理限幅</text>
      <text class="tiny mid" x="485" y="29">关节 ±20 N·m · 轮 ±4 N·m</text>
    </g>
  </g>

  <!-- 层 4：模型层 -->
  <g transform="translate(60,430)">
    <rect class="layer" x="0" y="0" width="600" height="92" rx="6"/>
    <text class="lbl" x="14" y="22" font-weight="bold">④ 模型层（MJCF/）</text>
    <text class="tiny" x="14" y="38">原版 MJCF 文件描述机器人几何 / 关节 / 执行器，避免简化几何带来与实物的差异</text>

    <g transform="translate(14,50)">
      <rect class="sub" x="0"   y="0" width="120" height="36" rx="4"/>
      <text class="mono mid" x="60" y="14">env.xml</text>
      <text class="tiny mid" x="60" y="28">仿真场景入口</text>

      <rect class="sub" x="130" y="0" width="135" height="36" rx="4"/>
      <text class="mono mid" x="197" y="14">robot.xml</text>
      <text class="tiny mid" x="197" y="28">机体 + 双腿 + 轮</text>

      <rect class="sub" x="275" y="0" width="120" height="36" rx="4"/>
      <text class="mono mid" x="335" y="14">axis.xml</text>
      <text class="tiny mid" x="335" y="28">参考坐标轴</text>

      <rect class="sub" x="405" y="0" width="175" height="36" rx="4"/>
      <text class="mono mid" x="492" y="14">meshes/*.STL</text>
      <text class="tiny mid" x="492" y="28">连杆 / 轮 几何网格</text>
    </g>
  </g>

  <!-- 层间纵向箭头（左侧通道：调度/数据 自上而下 / 自下而上） -->
  <!-- 调度（黑实线，自上而下） -->
  <line class="arrow" x1="200" y1="162" x2="200" y2="186" marker-end="url(#arr)"/>
  <line class="arrow" x1="200" y1="282" x2="200" y2="306" marker-end="url(#arr)"/>
  <line class="arrow" x1="200" y1="402" x2="200" y2="426" marker-end="url(#arr)"/>
  <text class="tiny mid" x="170" y="178">调度</text>
  <text class="tiny mid" x="170" y="298">写</text>
  <text class="tiny mid" x="170" y="418">读取</text>

  <!-- 数据上行（虚线 + 箭头） -->
  <path class="dashed" d="M 520 426 L 520 402" marker-end="url(#arr)"/>
  <path class="dashed" d="M 520 306 L 520 282" marker-end="url(#arr)"/>
  <path class="dashed" d="M 520 186 L 520 162" marker-end="url(#arr)"/>
  <text class="tiny mid" x="552" y="178">状态</text>
  <text class="tiny mid" x="552" y="298">观测</text>
  <text class="tiny mid" x="552" y="418">几何</text>

  <!-- ============================ 右侧：控制器与外部 IO ============================ -->
  <!-- 控制器（统一接口） -->
  <g transform="translate(700,90)">
    <rect class="panel" x="0" y="0" width="180" height="200" rx="6"/>
    <text class="lbl mid" x="90" y="22" font-weight="bold">控制器</text>
    <text class="tiny mid" x="90" y="38">compute(imu, motors)</text>
    <text class="tiny mid" x="90" y="52">→ (τ_joint, τ_wheel)</text>

    <rect class="sub" x="14" y="68" width="152" height="32" rx="4"/>
    <text class="sm mid" x="90" y="88">PID</text>

    <rect class="sub" x="14" y="106" width="152" height="32" rx="4"/>
    <text class="sm mid" x="90" y="126">LQR (K(L₀) 插值)</text>

    <rect class="sub" x="14" y="144" width="152" height="32" rx="4"/>
    <text class="sm mid" x="90" y="164">MPC (PGD)</text>
  </g>

  <!-- 控制器 ↔ 主循环：状态 / 控制双向 -->
  <line class="arrow" x1="700" y1="130" x2="660" y2="130" marker-end="url(#arr)"/>
  <line class="arrow" x1="660" y1="160" x2="700" y2="160" marker-end="url(#arr)"/>
  <text class="tiny mid" x="680" y="124">x</text>
  <text class="tiny mid" x="680" y="174">u</text>

  <!-- 外部 IO -->
  <g transform="translate(700,310)">
    <rect class="panel" x="0" y="0" width="180" height="210" rx="6"/>
    <text class="lbl mid" x="90" y="22" font-weight="bold">外部交互</text>

    <rect class="sub" x="14" y="36" width="152" height="34" rx="4"/>
    <text class="sm mid" x="90" y="50">UDP 指令</text>
    <text class="tiny mid" x="90" y="64">速度 / yaw / L₀ 目标</text>

    <rect class="sub" x="14" y="78" width="152" height="34" rx="4"/>
    <text class="sm mid" x="90" y="92">键盘控制</text>
    <text class="tiny mid" x="90" y="106">运行时手动干预</text>

    <rect class="sub" x="14" y="120" width="152" height="34" rx="4"/>
    <text class="sm mid" x="90" y="134">状态打印 / 日志</text>
    <text class="tiny mid" x="90" y="148">监控周期 T_m</text>

    <rect class="sub" x="14" y="162" width="152" height="34" rx="4"/>
    <text class="sm mid" x="90" y="176">MuJoCo Viewer</text>
    <text class="tiny mid" x="90" y="190">实时可视化（可选）</text>
  </g>

  <!-- 外部 IO → 控制器目标缓存（UDP / 键盘热更新控制器内部目标变量，不经主循环） -->
  <line class="arrow" x1="790" y1="310" x2="790" y2="290" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text class="tiny mid" x="790" y="304">目标</text>

  <!-- 底部说明 -->
  <text class="tiny mid" x="460" y="575">注：仿真步长 Δt 与控制周期 T_c 严格分离，保证物理求解稳定的同时支持上层算法以 250 Hz 工作。</text>
</svg>
