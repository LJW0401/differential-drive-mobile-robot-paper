<?xml version="1.0" encoding="UTF-8"?>
<!--
  еӣҫзј–еҸ·пјҡеӣҫ 3
  еӣҫйўҳпјҡ  дә”иҝһжқҶжңәжһ„ + иҷҡжӢҹи…ҝеҸӮж•°е®ҡд№үеӣҫ
  и®әж–Үз« иҠӮпјҡ3.2 жңәжһ„дёҺеҠЁеҠӣеӯҰе»әжЁЎжЁЎеқ—и®ҫи®Ў
  е…ій”®дҫқиө–пјҡдёҺ five_link_ctrl_simulation/VMC.py зҡ„жӯЈиҝҗеҠЁеӯҰ/йӣ…еҸҜжҜ”дҝқжҢҒдёҖиҮҙ
            - еӣәе®ҡй“° A=(0,0)пјҢE=(l5,0)
            - й©ұеҠЁе…іиҠӮи§’ ПҶ1=вҲ xAB, ПҶ4=вҲ xED
            - дёӯй—ҙиҝһжқҶ ПҶ2=вҲ xBC, ПҶ3=вҲ xDC
            - иҷҡжӢҹи…ҝжһҒзӮ№ M=(l5/2, 0)пјҢL0=|MC|пјҢПҶ0=вҲ xMC
            - йӣ…еҸҜжҜ”е°Ҷ (F0, Tp) вҶҰ (П„1, П„4)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 920 560" width="920" height="560"
     font-family="'Noto Serif CJK SC','Source Han Serif SC','Songti SC','SimSun','Times New Roman',serif">
  <style>
    .bg     { fill:#ffffff; }
    .link   { fill:none; stroke:#000; stroke-width:2.2; stroke-linecap:round; }
    .vleg   { fill:none; stroke:#000; stroke-width:1.6; stroke-dasharray:6 4; }
    .axis   { fill:none; stroke:#444; stroke-width:0.8; }
    .arrow  { fill:none; stroke:#000; stroke-width:1.4; }
    .arc    { fill:none; stroke:#666; stroke-width:1.0; }
    .joint  { fill:#ffffff; stroke:#000; stroke-width:1.6; }
    .pivot  { fill:#000; }
    .foot   { fill:#f0f0f0; stroke:#000; stroke-width:1.6; }
    .lbl    { font-size:18px; fill:#000; }
    .small  { font-size:14px; fill:#000; }
    .tiny   { font-size:12px; fill:#444; }
    .mid    { text-anchor:middle; }
    .italic { font-style:italic; }
    .force  { fill:none; stroke:#000; stroke-width:2.0; }
    .torque { fill:none; stroke:#000; stroke-width:1.6; }
    .panel  { fill:none; stroke:#888; stroke-width:0.8; stroke-dasharray:3 3; }
  </style>

  <rect class="bg" x="0" y="0" width="920" height="560"/>

  <!-- ж Үйўҳ -->
  <text class="lbl mid" x="460" y="34" font-weight="bold">дә”иҝһжқҶжңәжһ„дёҺиҷҡжӢҹи…ҝеҸӮж•°е®ҡд№ү</text>
  <text class="tiny mid" x="460" y="54">AгҖҒE дёәеӣәе®ҡй“°пјҢA B C D 4 дёӘй“°й“ҫ + 2 ж®өиҝһжқҶжһ„жҲҗй—ӯй“ҫпјӣM дёәиҷҡжӢҹи…ҝжһҒзӮ№</text>

  <!-- ============================ е·Ұдҫ§дё»еӣҫпјҡдә”иҝһжқҶжңәжһ„ ============================ -->
  <g transform="translate(0,0)">
    <!-- еә•зӣҳжЁӘжўҒпјҲжңәдҪ“е®үиЈ…йқў AEпјү -->
    <rect x="230" y="100" width="320" height="22" fill="#fafafa" stroke="#000" stroke-width="1.4"/>
    <text class="small" x="556" y="115">жңәдҪ“е®үиЈ…йқў</text>

    <!-- еҮ дҪ•еқҗж Ү -->
    <!-- A=(260,122) E=(520,122) M=(390,122) -->
    <!-- йҖүеҸ– phi1вүҲ-110В°, phi4вүҲ-70В°пјҲиҗҪеңЁе·ҘдҪңз©әй—ҙеҶ…зҡ„еҜ№з§°жһ„еһӢпјү -->
    <!-- B = A + l1*(cosПҶ1,sinПҶ1); D = E + l4*(cosПҶ4,sinПҶ4); еҸ–иҝ‘дјјеқҗж Ү -->
    <!-- A=(260,122), B=(220,255)  l1вүҲ140 -->
    <!-- E=(520,122), D=(560,255)  l4вүҲ140 -->
    <!-- C=(390,420)               BCвүҲ210, DCвүҲ210 -->

    <!-- дә”иҝһжқҶпјҡAE (жңәдҪ“), AB, BC, CD, DE -->
    <line class="link" x1="260" y1="122" x2="220" y2="255"/>  <!-- AB l1 -->
    <line class="link" x1="220" y1="255" x2="390" y2="420"/>  <!-- BC l2 -->
    <line class="link" x1="390" y1="420" x2="560" y2="255"/>  <!-- CD l3 -->
    <line class="link" x1="560" y1="255" x2="520" y2="122"/>  <!-- DE l4 -->
    <!-- AE е·Із”ұ chassis зҹ©еҪўдҪ“зҺ°пјҢеҶҚз”»дёҖжқЎеҸӮиҖғзәҝ -->
    <line class="axis" x1="260" y1="122" x2="520" y2="122"/>

    <!-- иҷҡжӢҹи…ҝ MC -->
    <line class="vleg" x1="390" y1="122" x2="390" y2="420"/>
    <!-- иҷҡжӢҹи…ҝз«ҜеҠӣ F0пјҡжІҝ MC ж–№еҗ‘пјҢеҗ‘дёҠз®ӯеӨҙпјҲи¶із«Ҝ вҶ’ дҪ“пјү -->
    <defs>
      <marker id="arrhd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
      </marker>
      <marker id="arrhd_sm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
      </marker>
      <marker id="arrhd_open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
      </marker>
    </defs>

    <line class="force" x1="390" y1="420" x2="390" y2="350" marker-end="url(#arrhd)"/>
    <text class="lbl" x="400" y="380" font-style="italic">F</text>
    <text class="small" x="416" y="386">0</text>

    <!-- TpпјҡдҪңз”ЁеңЁиҷҡжӢҹи…ҝдёҺжңәдҪ“жҺҘеҸЈеӨ„зҡ„жүӯзҹ©пјҢзҙ§еҮ‘еј§зәҝйҒҝејҖеүҜж Үйўҳ -->
    <path class="torque" d="M 374 92 a 16 16 0 1 0 32 -2" marker-end="url(#arrhd_sm)"/>
    <text class="lbl italic" x="412" y="80">T</text>
    <text class="small" x="426" y="86">p</text>

    <!-- иҠӮзӮ№ж Үи®° -->
    <!-- A еӣәе®ҡй“°пјҡе®һеҝғ + дёүи§’ж”Ҝеә§ -->
    <polygon class="foot" points="260,122 248,144 272,144"/>
    <line class="axis" x1="244" y1="144" x2="276" y2="144"/>
    <circle class="pivot" cx="260" cy="122" r="4"/>
    <!-- E еӣәе®ҡй“° -->
    <polygon class="foot" points="520,122 508,144 532,144"/>
    <line class="axis" x1="504" y1="144" x2="536" y2="144"/>
    <circle class="pivot" cx="520" cy="122" r="4"/>
    <!-- M иҷҡжӢҹжһҒзӮ№пјҲAгҖҒE дёӯзӮ№пјү-->
    <circle cx="390" cy="122" r="3.5" fill="#000"/>
    <!-- B / DпјҡеҸҜеҠЁй“°й“ҫ -->
    <circle class="joint" cx="220" cy="255" r="5"/>
    <circle class="joint" cx="560" cy="255" r="5"/>
    <!-- Cпјҡи¶із«Ҝ -->
    <circle class="joint" cx="390" cy="420" r="6"/>

    <!-- зӮ№еҗҚж Үзӯҫ -->
    <text class="lbl" x="244" y="115">A</text>
    <text class="lbl" x="528" y="115">E</text>
    <text class="lbl" x="378" y="115">M</text>
    <text class="lbl" x="198" y="262">B</text>
    <text class="lbl" x="566" y="262">D</text>
    <text class="lbl" x="396" y="438">C</text>

    <!-- иҝһжқҶй•ҝеәҰж ҮжіЁ -->
    <text class="small italic" x="225" y="195">l</text>
    <text class="tiny" x="234" y="199">1</text>

    <text class="small italic" x="295" y="350">l</text>
    <text class="tiny" x="303" y="354">2</text>

    <text class="small italic" x="478" y="350">l</text>
    <text class="tiny" x="486" y="354">3</text>

    <text class="small italic" x="558" y="195">l</text>
    <text class="tiny" x="566" y="199">4</text>

    <text class="small italic" x="382" y="138">l</text>
    <text class="tiny" x="390" y="142">5</text>

    <!-- е…іиҠӮи§’ ПҶ1, ПҶ4 -->
    <!-- ПҶ1 еңЁ A еӨ„пјҡд»Һ +x иҪҙеҲ° AB ж–№еҗ‘ -->
    <path class="arc" d="M 290 122 A 30 30 0 0 1 273 148" marker-end="url(#arrhd_open)"/>
    <text class="small italic" x="294" y="148">ПҶ</text>
    <text class="tiny" x="307" y="152">1</text>

    <!-- ПҶ4 еңЁ E еӨ„пјҡд»Һ +x иҪҙеҲ° ED ж–№еҗ‘ -->
    <path class="arc" d="M 550 122 A 30 30 0 0 1 533 148" marker-end="url(#arrhd_open)"/>
    <text class="small italic" x="552" y="148">ПҶ</text>
    <text class="tiny" x="565" y="152">4</text>

    <!-- ПҶ2 еңЁ B еӨ„пјҡд»Һ +x еҲ° BC ж–№еҗ‘ -->
    <path class="arc" d="M 250 255 A 30 30 0 0 1 238 280" marker-end="url(#arrhd_open)"/>
    <text class="small italic" x="252" y="282">ПҶ</text>
    <text class="tiny" x="265" y="286">2</text>

    <!-- ПҶ3 еңЁ D еӨ„ -->
    <path class="arc" d="M 530 255 A 30 30 0 0 0 542 280" marker-end="url(#arrhd_open)"/>
    <text class="small italic" x="510" y="282">ПҶ</text>
    <text class="tiny" x="523" y="286">3</text>

    <!-- иҷҡжӢҹи…ҝ L0 ж ҮжіЁ -->
    <text class="lbl italic" x="402" y="285">L</text>
    <text class="small" x="416" y="291">0</text>

    <!-- ПҶ0 жһҒи§’пјҡеңЁ M еӨ„пјҢиҮӘ +x еҲ° MC -->
    <path class="arc" d="M 425 122 A 35 35 0 0 1 411 152" marker-end="url(#arrhd_open)"/>
    <text class="small italic" x="425" y="150">ПҶ</text>
    <text class="tiny" x="438" y="154">0</text>

    <!-- еұҖйғЁеқҗж ҮиҪҙпјҲжңәдҪ“еқҗж ҮпјҢеҺҹзӮ№еңЁ Aпјү -->
    <g transform="translate(160,122)">
      <line class="axis" x1="0" y1="0" x2="40" y2="0" marker-end="url(#arrhd_open)"/>
      <line class="axis" x1="0" y1="0" x2="0" y2="40" marker-end="url(#arrhd_open)"/>
      <text class="small italic" x="44" y="4">x</text>
      <text class="small italic" x="6"  y="48">y</text>
      <text class="tiny" x="-2" y="-6">жңәдҪ“зі»</text>
    </g>
  </g>

  <!-- ============================ еҸідҫ§йқўжқҝпјҡеҸӮж•°иЎЁ + йӣ…еҸҜжҜ”е…ізі» ============================ -->
  <g transform="translate(620,90)">
    <rect class="panel" x="0" y="0" width="280" height="430"/>
    <text class="small mid" x="140" y="22" font-weight="bold">еҸӮж•°дёҺжҳ е°„е…ізі»</text>

    <!-- еҮ дҪ•еҸӮж•° -->
    <text class="small" x="14" y="56" font-weight="bold">еҮ дҪ•еҸӮж•°пјҲдёҺд»Јз ҒдёҖиҮҙпјү</text>
    <text class="small italic" x="14" y="80">l</text>
    <text class="tiny"  x="22" y="84">1</text>
    <text class="small" x="34" y="80">=</text>
    <text class="small italic" x="48" y="80">l</text>
    <text class="tiny"  x="56" y="84">4</text>
    <text class="small" x="68" y="80">= 0.215 m</text>

    <text class="small italic" x="14" y="102">l</text>
    <text class="tiny"  x="22" y="106">2</text>
    <text class="small" x="34" y="102">=</text>
    <text class="small italic" x="48" y="102">l</text>
    <text class="tiny"  x="56" y="106">3</text>
    <text class="small" x="68" y="102">= 0.258 m</text>

    <text class="small italic" x="14" y="124">l</text>
    <text class="tiny"  x="22" y="128">5</text>
    <text class="small" x="34" y="124">= 0пјҲAE еҗҢиҪҙиҝ‘дјјпјү</text>

    <!-- е…іиҠӮи§’еҸҳйҮҸ -->
    <text class="small" x="14" y="158" font-weight="bold">е…іиҠӮз©әй—ҙ / иҷҡжӢҹи…ҝз©әй—ҙ</text>
    <text class="small" x="14" y="182">е…іиҠӮи§’пјҡ</text>
    <text class="small italic" x="80" y="182">ПҶ</text>
    <text class="tiny"  x="93" y="186">1</text>
    <text class="small" x="102" y="182">,</text>
    <text class="small italic" x="112" y="182">ПҶ</text>
    <text class="tiny"  x="125" y="186">4</text>
    <text class="small" x="138" y="182">пјҲй©ұеҠЁпјү</text>

    <text class="small" x="14" y="204">д»ҺеҠЁи§’пјҡ</text>
    <text class="small italic" x="80" y="204">ПҶ</text>
    <text class="tiny"  x="93" y="208">2</text>
    <text class="small" x="102" y="204">,</text>
    <text class="small italic" x="112" y="204">ПҶ</text>
    <text class="tiny"  x="125" y="208">3</text>
    <text class="small" x="138" y="204">пјҲй—ӯй“ҫзәҰжқҹжұӮеҮәпјү</text>

    <text class="small" x="14" y="226">иҷҡжӢҹи…ҝпјҡ</text>
    <text class="small italic" x="80" y="226">L</text>
    <text class="tiny"  x="91" y="230">0</text>
    <text class="small" x="100" y="226">,</text>
    <text class="small italic" x="110" y="226">ПҶ</text>
    <text class="tiny"  x="123" y="230">0</text>
    <text class="small" x="138" y="226">пјҲй•ҝеәҰ / жһҒи§’пјү</text>

    <!-- жӯЈиҝҗеҠЁеӯҰ -->
    <text class="small" x="14" y="262" font-weight="bold">жӯЈиҝҗеҠЁеӯҰпјҲFKпјү</text>
    <text class="small mid" x="140" y="288">
      (
      <tspan font-style="italic">ПҶ</tspan><tspan font-size="10px" dy="3">1</tspan><tspan dy="-3">, </tspan>
      <tspan font-style="italic">ПҶ</tspan><tspan font-size="10px" dy="3">4</tspan><tspan dy="-3">)</tspan>
      &#160;вҹ¶&#160;
      (<tspan font-style="italic">L</tspan><tspan font-size="10px" dy="3">0</tspan><tspan dy="-3">, </tspan>
      <tspan font-style="italic">ПҶ</tspan><tspan font-size="10px" dy="3">0</tspan><tspan dy="-3">)</tspan>
    </text>

    <!-- йӣ…еҸҜжҜ”еҠӣжҳ е°„ -->
    <text class="small" x="14" y="320" font-weight="bold">иҷҡжӢҹи…ҝз«ҜеҠӣ вҶ’ е…іиҠӮеҠӣзҹ©</text>
    <text class="small mid" x="140" y="350">
      [ <tspan font-style="italic">П„</tspan><tspan font-size="10px" dy="3">1</tspan><tspan dy="-3">, </tspan>
      <tspan font-style="italic">П„</tspan><tspan font-size="10px" dy="3">4</tspan><tspan dy="-3"> ]</tspan><tspan>бөҖ</tspan>
      &#160;=&#160;
      <tspan font-style="italic">J</tspan>(<tspan font-style="italic">ПҶ</tspan><tspan font-size="10px" dy="3">1</tspan><tspan dy="-3">,</tspan>
      <tspan font-style="italic">ПҶ</tspan><tspan font-size="10px" dy="3">4</tspan><tspan dy="-3">)</tspan>
    </text>
    <text class="small mid" x="140" y="372">
      В· [ <tspan font-style="italic">F</tspan><tspan font-size="10px" dy="3">0</tspan><tspan dy="-3">, </tspan>
      <tspan font-style="italic">T</tspan><tspan font-size="10px" dy="3">p</tspan><tspan dy="-3"> ]</tspan><tspan>бөҖ</tspan>
    </text>

    <text class="tiny" x="14" y="402">иҜҙжҳҺпјҡ</text>
    <text class="tiny" x="14" y="418">В·</text>
    <text class="tiny" x="22" y="418">
      <tspan font-style="italic">F</tspan><tspan dy="3" font-size="9px">0</tspan><tspan dy="-3"> жҺ§и…ҝй•ҝпјҢ</tspan>
      <tspan font-style="italic">T</tspan><tspan dy="3" font-size="9px">p</tspan><tspan dy="-3"> жҺ§иҪҰиә«еҖҫи§’ </tspan>
      <tspan font-style="italic">Оё</tspan>
    </text>
  </g>

  <!-- еә•йғЁиҜҙжҳҺ -->
  <text class="tiny mid" x="460" y="540">жіЁпјҡ(FвӮҖ, T_p) з”ұдёҠеұӮе№іиЎЎжҺ§еҲ¶еҷЁз»ҷеҮәпјҢз»Ҹ VMC йӣ…еҸҜжҜ”жҳ е°„дёәе…іиҠӮеҠӣзҹ© (П„вӮҒ, П„вӮ„)пјҢдёӢеұӮдјәжңҚзҺҜжү§иЎҢгҖӮ</text>
</svg>
